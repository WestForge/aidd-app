name: Package AIDD

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-windows:
    name: Windows NSIS installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Windows installer
        run: npm run dist:win:clean
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: aidd-windows-installer-${{ github.sha }}
          path: |
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.blockmap
            dist/**/latest.yml
            release/**/*.exe
            release/**/*.msi
            release/**/*.blockmap
            release/**/latest.yml
          if-no-files-found: warn

  package-macos:
    name: macOS DMG and ZIP
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build app before packaging
        run: npm run build

      - name: Verify Electron entry file
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f dist/main/main.js ]; then
            echo "Expected Electron entry file was not found: dist/main/main.js"
            echo "Files currently present under dist:"
            find dist -maxdepth 4 -type f | sort || true
            exit 1
          fi

      - name: Build macOS packages
        shell: bash
        run: |
          set -euo pipefail

          should_sign=false
          if [ -n "${MAC_CSC_LINK:-}" ]; then
            if [ "${MAC_CSC_LINK}" = "." ] || [ "${MAC_CSC_LINK}" = "${GITHUB_WORKSPACE}" ]; then
              echo "::warning::MAC_CSC_LINK points to the workspace directory; building unsigned macOS packages."
            elif [ -d "${MAC_CSC_LINK}" ]; then
              echo "::warning::MAC_CSC_LINK points to a directory; building unsigned macOS packages."
            else
              should_sign=true
            fi
          else
            echo "MAC_CSC_LINK is not configured; building unsigned macOS packages."
          fi

          if [ "${should_sign}" = "true" ]; then
            export CSC_LINK="${MAC_CSC_LINK}"
            export CSC_KEY_PASSWORD="${MAC_CSC_KEY_PASSWORD:-}"
            npx electron-builder --mac --universal --publish never
          else
            unset CSC_LINK CSC_KEY_PASSWORD CSC_NAME
            unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            unset APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER
            unset APPLE_KEYCHAIN APPLE_KEYCHAIN_PROFILE
            npx electron-builder --mac --universal --publish never -c.mac.identity=null -c.mac.notarize=false
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: aidd-macos-${{ github.sha }}
          path: |
            dist/**/*.dmg
            dist/**/*.pkg
            dist/**/*.zip
            dist/**/*.blockmap
            dist/**/latest-mac.yml
            release/**/*.dmg
            release/**/*.pkg
            release/**/*.zip
            release/**/*.blockmap
            release/**/latest-mac.yml
          if-no-files-found: warn

  package-linux:
    name: Linux AppImage, DEB and TAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build app before packaging
        run: npm run build

      - name: Verify Electron entry file
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f dist/main/main.js ]; then
            echo "Expected Electron entry file was not found: dist/main/main.js"
            echo "Files currently present under dist:"
            find dist -maxdepth 4 -type f | sort || true
            exit 1
          fi

      - name: Build Linux packages
        run: npx electron-builder --linux AppImage deb tar.gz --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: aidd-linux-${{ github.sha }}
          path: |
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.tar.gz
            dist/**/*.blockmap
            dist/**/latest-linux.yml
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.tar.gz
            release/**/*.blockmap
            release/**/latest-linux.yml
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    needs:
      - package-windows
      - package-macos
      - package-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          echo "Creating release for tag: ${TAG_NAME}"

          mapfile -d '' assets < <(
            find artifacts \
              -path '*/win-unpacked/*' -prune \
              -o -type f \
              \( -name '*.exe' \
              -o -name '*.msi' \
              -o -name '*.dmg' \
              -o -name '*.pkg' \
              -o -name '*.zip' \
              -o -name '*.AppImage' \
              -o -name '*.deb' \
              -o -name '*.tar.gz' \
              -o -name '*.blockmap' \
              -o -name 'latest.yml' \
              -o -name 'latest-mac.yml' \
              -o -name 'latest-linux.yml' \) \
              -print0 | sort -z
          )

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found."
            find artifacts -maxdepth 4 -type f -print || true
            exit 1
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists. Delete it or use a new tag."
            exit 1
          fi

          printf 'Release assets:\n'
          printf ' - %s\n' "${assets[@]}"

          gh release create "${TAG_NAME}" "${assets[@]}" \
            --title "AIDD ${TAG_NAME}" \
            --generate-notes \
            --verify-tag
