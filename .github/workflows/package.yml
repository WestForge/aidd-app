name: Package AIDD

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-windows:
    name: Windows NSIS installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Windows installer artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run dist:win:clean

      - name: Build and publish Windows release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: npm run dist:win:publish:clean
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: aidd-windows-installer
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/win-unpacked/**
